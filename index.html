<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বিলেতী পণ্য - প্রোডাক্ট ইম্পোর্টার</title>
    <!-- Google Font: Hind Siliguri for beautiful Bengali typography -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #002f6c;
            --secondary-color: #ffcc00;
            --background-color: #f4f7f6;
            --card-background: #ffffff;
            --text-color: #333333;
            --success-color: #28a745;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Hind Siliguri', sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-background);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 15px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            font-weight: 700;
        }

        header p {
            color: #666;
            font-size: 1.1rem;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        button {
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #001f4d;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        /* Product Display Section */
        #productCard {
            display: none;
            border: 2px solid #eef2f5;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            background: #fafbfc;
        }

        .product-details {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        .product-image-container {
            flex: 1;
            min-width: 200px;
            max-width: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
        }

        .product-image-container img {
            max-width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 4px;
        }

        .product-info {
            flex: 2;
            min-width: 250px;
        }

        .product-info h2 {
            color: var(--primary-color);
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        /* Details Table styling */
        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .info-table th, .info-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 1rem;
        }

        .info-table th {
            font-weight: 600;
            color: #555;
            width: 40%;
        }

        .info-table td {
            color: #000;
            font-weight: bold;
        }

        .alert-message {
            display: none;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: 600;
            text-align: center;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 600px) {
            .product-details {
                flex-direction: column;
            }
            .product-image-container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>বিলেতী পণ্য (BiletiPonno)</h1>
        <p>ইউকে প্রোডাক্ট লিংক থেকে তথ্য ও ইমেজের অটোমেটিক স্ক্র্যাপার</p>
    </header>

    <div class="form-group">
        <label for="productLink">ইউকে প্রোডাক্টের লিংক দিন (Tesco, John West, ইত্যাদি):</label>
        <div class="input-wrapper">
            <input type="text" id="productLink" placeholder="https://www.tesco.com/groceries/en-GB/products/..." />
            <button id="fetchBtn" onclick="fetchProductData()">তথ্য আনুন</button>
        </div>
    </div>

    <!-- Error Handling UI -->
    <div id="errorAlert" class="alert-message alert-error"></div>

    <!-- Product Card Area -->
    <div id="productCard">
        <div class="product-details">
            <div class="product-image-container">
                <img id="prodImage" src="" alt="প্রোডাক্ট ইমেজ" onerror="this.src='https://via.placeholder.com/300?text=No+Image+Found'" />
            </div>
            <div class="product-info">
                <h2 id="prodName">প্রোডাক্টের নাম এখানে দেখাবে</h2>
                <table class="info-table">
                    <tr>
                        <th>মূল্য (GBP £):</th>
                        <td id="prodPrice">£০.০০</td>
                    </tr>
                    <tr>
                        <th>ওজন (Weight):</th>
                        <td id="prodWeight">0 Grams</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    async function fetchProductData() {
        const urlInput = document.getElementById('productLink').value.trim();
        const fetchButton = document.getElementById('fetchBtn');
        const errorAlert = document.getElementById('errorAlert');
        const productCard = document.getElementById('productCard');

        // রিসেট ভিউ
        errorAlert.style.display = "none";
        productCard.style.display = "none";

        if (!urlInput) {
            alert('দয়া করে প্রথমে একটি প্রোডাক্ট লিংক পেস্ট করুন!');
            return;
        }

        fetchButton.innerText = "খোঁজা হচ্ছে...";
        fetchButton.disabled = true;

        try {
            // ⚠️ আপনি লোকালি চালালে এটি http://127.0.0.1:5000/scrape থাকবে
            // রেন্ডারে লাইভ করলে এটি পরিবর্তন করে https://your-app.onrender.com/scrape করতে হবে
            const apiURL = "http://127.0.0.1:5000/scrape"; 

            const response = await fetch(apiURL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ url: urlInput })
            });

            const result = await response.json();

            if (!response.ok) {
                throw new Error(result.error || "তথ্য স্ক্র্যাপ করতে ব্যর্থ হয়েছে!");
            }

            // UI-তে ডাটা বসানো
            document.getElementById('prodName').innerText = result.name || "নাম পাওয়া যায়নি";
            document.getElementById('prodPrice').innerText = `£${result.price.toFixed(2)}`;
            document.getElementById('prodWeight').innerText = `${result.weight} ${result.unit}`;
            
            // ছবি সেট করা
            const imgElement = document.getElementById('prodImage');
            if (result.image) {
                imgElement.src = result.image;
            } else {
                imgElement.src = 'https://via.placeholder.com/300?text=No+Image+Available';
            }

            // প্রোডাক্ট কার্ড শো করা
            productCard.style.display = "block";

        } catch (error) {
            console.error("Error fetching product details:", error);
            errorAlert.innerText = `ত্রুটি: তথ্যটি স্ক্র্যাপ করা যায়নি। আপনার লোকাল পাইথন এপিআই সার্ভারটি চালু আছে কি না পরীক্ষা করুন।`;
            errorAlert.style.display = "block";
        } finally {
            fetchButton.innerText = "তথ্য আনুন";
            fetchButton.disabled = false;
        }
    }
</script>

</body>
</html>
