<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beleti Ponno | Professional E-commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.tab-active { border-bottom: 2px solid #0284c7; color: #0284c7; }</style>
</head>
<body class="bg-slate-50">

    <!-- Navbar -->
    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-black text-sky-600">BELETI PONNO</div>
        <div class="flex gap-8 font-bold text-slate-600">
            <button onclick="showView('storefront')" class="tab-active" id="btn-storefront">📦 Storefront</button>
            <button onclick="showView('orders')" id="btn-orders">📋 Order Management</button>
        </div>
    </nav>

    <!-- Hidden Form for Sheet Monkey -->
    <form id="orderForm" action="YOUR_SHEET_MONKEY_URL" method="POST" class="hidden">
        <input type="hidden" name="Name" id="formName">
        <input type="hidden" name="Phone" id="formPhone">
        <input type="hidden" name="Total" id="formTotal">
        <input type="hidden" name="Order_ID" id="formOrderId">
    </form>

    <main class="max-w-7xl mx-auto p-6">
        <!-- 1. Storefront View -->
        <section id="storefront-view" class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <h2 class="text-lg font-bold mb-4">AI Product Importer</h2>
                <div class="flex gap-2">
                    <input type="text" id="link" class="border p-2 rounded flex-1" placeholder="Paste UK Link...">
                    <button onclick="fetchProduct()" class="bg-sky-600 text-white px-4 py-2 rounded">Import</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="productGrid">
                <!-- Products will appear here -->
            </div>
        </section>

        <!-- 2. Order Management View -->
        <section id="orders-view" class="hidden">
            <div class="bg-white rounded-xl shadow-sm border p-6">
                <h2 class="text-xl font-bold mb-4">Live Order Database</h2>
                <p class="text-sm text-slate-500 mb-4">All orders are synced to your linked Google Sheet.</p>
                <table class="w-full text-left">
                    <thead class="bg-slate-50"><tr><th class="p-3">Order ID</th><th class="p-3">Customer</th><th class="p-3">Total</th></tr></thead>
                    <tbody id="orderTableBody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        let cartTotal = 0;

        function showView(v) {
            document.getElementById('storefront-view').classList.toggle('hidden', v !== 'storefront');
            document.getElementById('orders-view').classList.toggle('hidden', v !== 'orders');
        }

        function fetchProduct() {
            // Your existing AI logic here
            alert("Product imported to catalog!");
        }

        function proceedToCheckout() {
            const name = prompt("Enter your name:");
            const phone = prompt("Enter your phone number:");
            
            if(name && phone) {
                document.getElementById('formName').value = name;
                document.getElementById('formPhone').value = phone;
                document.getElementById('formTotal').value = "৳5200";
                document.getElementById('formOrderId').value = "BP-" + Math.floor(Math.random()*9999);
                
                document.getElementById('orderForm').submit();
            }
        }
    </script>
</body>
</html>
