<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beleti Ponno | Professional E-commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --sky-500: #0284c7; --sky-600: #0369a1; }
        .tab-active { border-bottom: 2px solid var(--sky-500); color: var(--sky-500); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="text-2xl font-black text-sky-600 tracking-tight">BELETI PONNO</div>
        <div class="flex gap-8 font-semibold text-slate-600">
            <button onclick="showView('storefront')" class="tab-active" id="btn-storefront">Storefront</button>
            <button onclick="showView('orders')" id="btn-orders">Order Management</button>
        </div>
    </nav>

    <!-- Main Views -->
    <main class="max-w-7xl mx-auto p-6">
        
        <!-- Storefront View -->
        <section id="storefront-view" class="space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h1 class="text-xl font-bold mb-4">Product Catalog</h1>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6" id="productGrid">
                    <!-- Products injected via JS -->
                </div>
            </div>
        </section>

        <!-- Order Management View -->
        <section id="orders-view" class="hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="p-4">Order ID</th>
                            <th class="p-4">Customer</th>
                            <th class="p-4">Phone</th>
                            <th class="p-4">Total Amount</th>
                            <th class="p-4">Status</th>
                            <th class="p-4">Action</th>
                        </tr>
                    </thead>
                    <tbody id="orderTableBody" class="divide-y divide-slate-100">
                        <!-- Dynamic Order Rows -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <script>
        // State Management
        let orders = [];

        function showView(view) {
            document.getElementById('storefront-view').classList.toggle('hidden', view !== 'storefront');
            document.getElementById('orders-view').classList.toggle('hidden', view !== 'orders');
            
            document.getElementById('btn-storefront').classList.toggle('tab-active', view === 'storefront');
            document.getElementById('btn-orders').classList.toggle('tab-active', view === 'orders');
        }

        // Professional Invoice Generation
        function generateInvoice(orderId) {
            const order = orders.find(o => o.id === orderId);
            const win = window.open('', '_blank', 'width=800,height=600');
            win.document.write(`
                <style>body{font-family:sans-serif; padding:40px; color:#334155;} .header{border-bottom:2px solid #0284c7; padding-bottom:10px;}</style>
                <div class="header"><h1>INVOICE #${order.id}</h1></div>
                <p><strong>Customer:</strong> ${order.name}</p>
                <p><strong>Phone:</strong> ${order.phone}</p>
                <p><strong>Total Amount:</strong> ${order.total}</p>
                <button onclick="window.print()" style="padding:10px 20px; background:#0284c7; color:white; border:none; cursor:pointer;">Print Invoice</button>
            `);
        }

        // Mock Order Injection (Replace with your actual logic)
        function addOrderToDatabase(name, phone, total) {
            const newOrder = { id: 'BP-' + Math.floor(Math.random()*9999), name, phone, total };
            orders.push(newOrder);
            
            const tbody = document.getElementById('orderTableBody');
            const row = `<tr>
                <td class="p-4 font-mono font-bold">${newOrder.id}</td>
                <td class="p-4">${name}</td>
                <td class="p-4">${phone}</td>
                <td class="p-4 font-bold text-sky-600">${total}</td>
                <td class="p-4"><span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs">Confirmed</span></td>
                <td class="p-4"><button onclick="generateInvoice('${newOrder.id}')" class="text-sky-600 font-bold hover:underline">View Invoice</button></td>
            </tr>`;
            tbody.innerHTML += row;
        }

        // Example: Trigger to simulate order creation
        // addOrderToDatabase("John Doe", "01700000000", "৳5,200");
    </script>
</body>
</html>
