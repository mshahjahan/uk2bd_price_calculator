<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>বিলেতী পণ্য - Admin Portal</title>
  <style>
    /* পূর্ববর্তী স্টাইলগুলো অপরিবর্তিত থাকবে, শুধু নতুনগুলো যোগ করা হলো */
    :root { --primary: #0284c7; --secondary: #0f172a; --success: #10b981; }
    
    body { font-family: sans-serif; background: #f0f9ff; }
    .nav-tabs { display: flex; gap: 20px; padding: 20px; background: white; margin-bottom: 20px; border-bottom: 2px solid #e0f2fe; }
    .tab-link { cursor: pointer; font-weight: bold; padding: 10px; }
    .tab-link.active { border-bottom: 3px solid var(--primary); color: var(--primary); }
    
    .content-section { display: none; padding: 20px; }
    .content-section.active { display: block; }

    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    th { background: #f8fafc; font-size: 13px; }
    .btn-print { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>

<div class="nav-tabs">
  <div class="tab-link active" onclick="showTab('catalogue')">📦 Storefront</div>
  <div class="tab-link" onclick="showTab('orders')">📋 Order Management</div>
</div>

<!-- ক্যাটালগ সেকশন (আগের মতো) -->
<div id="catalogue" class="content-section active">
   <!-- এখানে আপনার পূর্বের ক্যাটালগ কোডটি বসবে -->
   <p>ক্যাটালগ এবং কার্ট সিস্টেম এখানে থাকবে...</p>
</div>

<!-- অর্ডার ম্যানেজমেন্ট সেকশন -->
<div id="orders" class="content-section">
  <div style="background: white; padding: 20px; border-radius: 12px;">
    <h2>Customer Orders</h2>
    <table id="orderTable">
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Customer Name</th>
          <th>Phone</th>
          <th>Address</th>
          <th>Total Amount</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="orderTableBody">
        <!-- অর্ডারের ডেটা এখানে ডাইনামিকভাবে আসবে -->
      </tbody>
    </table>
  </div>
</div>

<script>
  // ট্যাব সুইচিং ফাংশন
  function showTab(tabId) {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
  }

  // অর্ডার সাবমিট করার পর টেবিল আপডেট করার ফাংশন
  function submitOrderForm() {
    const name = document.getElementById('custName').value;
    const phone = document.getElementById('custPhone').value;
    const address = document.getElementById('custAddress').value;
    const amount = document.getElementById('modalAmountBDT').innerText;

    const tableBody = document.getElementById('orderTableBody');
    const orderId = "ORD-" + Math.floor(Math.random() * 10000);
    
    const row = `<tr>
      <td>${orderId}</td>
      <td>${name}</td>
      <td>${phone}</td>
      <td>${address}</td>
      <td>${amount}</td>
      <td><button class="btn-print" onclick="printInvoice('${orderId}')">Print Invoice</button></td>
    </tr>`;
    
    tableBody.innerHTML += row;
    alert("অর্ডারটি সফলভাবে ডাটাবেসে যুক্ত হয়েছে!");
    closePaymentModal();
  }

  // ইনভয়েস প্রিন্ট করার জন্য
  function printInvoice(id) {
    const printWindow = window.open('', '_blank');
    printWindow.document.write(`<html><body><h1>Invoice ${id}</h1><p>আপনার ইনভয়েস ডিটেইলস এখানে থাকবে...</p></body></html>`);
    printWindow.print();
  }
</script>

</body>
</html>
