<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>বিলেতী পণ্য - Premium Light Blue Theme</title>
  <style>
    :root {
      --primary-light: #e0f2fe;    /* Very Light Sky */
      --primary: #0284c7;          /* Sky Blue */
      --primary-dark: #0369a1;     /* Deep Sky */
      --bg: #f8fafc;               /* Off-White/Blueish */
      --text: #0f172a;
      --card-bg: #ffffff;
      --border: #bae6fd;
    }

    body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }

    /* Navigation Tabs */
    .nav-container { background: white; padding: 15px 20px; border-bottom: 2px solid var(--primary-light); display: flex; gap: 20px; }
    .tab-link { cursor: pointer; font-weight: 600; padding: 8px 16px; border-radius: 8px; transition: 0.3s; color: var(--primary-dark); }
    .tab-link.active { background: var(--primary-light); color: var(--primary-dark); }

    .content-section { display: none; padding: 20px; max-width: 1200px; margin: auto; }
    .content-section.active { display: block; }

    /* Table Styling */
    .order-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th { background: var(--primary-light); color: var(--primary-dark); padding: 12px; text-align: left; }
    td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
    
    .btn-action { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    .btn-action:hover { background: var(--primary-dark); }

    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); backdrop-filter: blur(2px); align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 25px; border-radius: 15px; width: 400px; }
  </style>
</head>
<body>

<!-- Navigation -->
<div class="nav-container">
  <div class="tab-link active" onclick="showTab('catalogue')">📦 Storefront</div>
  <div class="tab-link" onclick="showTab('orders')">📋 Order Management</div>
</div>

<!-- 1. Storefront -->
<div id="catalogue" class="content-section active">
  <div class="order-card">
    <h2>Welcome to Beleti Ponno</h2>
    <p>লাইট স্কাই ব্লু থিমে আপনার প্রোডাক্ট ক্যাটালগ এখানে প্রদর্শিত হবে।</p>
    <!-- আপনার আগের ক্যাটালগ গ্রিড কোড এখানে বসবে -->
    <button class="btn-action" onclick="alert('Proceeding to Checkout...')">Proceed to Checkout</button>
  </div>
</div>

<!-- 2. Order Management -->
<div id="orders" class="content-section">
  <div class="order-card">
    <h2>📋 Customer Orders</h2>
    <table id="orderTable">
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Customer</th>
          <th>Phone</th>
          <th>Amount</th>
          <th>Invoice</th>
        </tr>
      </thead>
      <tbody id="orderTableBody">
        <!-- অর্ডারের ডেটা এখানে ডাইনামিকভাবে জমা হবে -->
      </tbody>
    </table>
  </div>
</div>

<script>
  function showTab(tabId) {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
  }

  // অর্ডারের ডেটা টেবিল এবং ইনভয়েস জেনারেশন
  function submitOrder(customerName, phone, amount, items) {
    const tableBody = document.getElementById('orderTableBody');
    const orderId = "ORD-" + Math.floor(Math.random() * 9000);
    
    const row = `<tr>
      <td>${orderId}</td>
      <td>${customerName}</td>
      <td>${phone}</td>
      <td>${amount}</td>
      <td><button class="btn-action" onclick="printInvoice('${orderId}', '${customerName}', '${amount}')">Print Invoice</button></td>
    </tr>`;
    
    tableBody.innerHTML += row;
  }

  function printInvoice(id, name, amount) {
    const printWindow = window.open('', '_blank');
    printWindow.document.write(`
      <style>
        body { font-family: sans-serif; padding: 40px; color: #333; }
        .header { border-bottom: 2px solid #0284c7; padding-bottom: 10px; margin-bottom: 20px; }
        .total { font-size: 20px; font-weight: bold; color: #0284c7; }
      </style>
      <div class="header"><h1>Invoice: ${id}</h1></div>
      <p>Customer: ${name}</p>
      <p>Total Amount: <span class="total">${amount}</span></p>
      <hr>
      <p>Thank you for shopping with Beleti Ponno!</p>
    `);
    printWindow.document.close();
    printWindow.print();
  }
</script>

</body>
</html>
